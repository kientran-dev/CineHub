spring.application.name=CineHub

# Database Configuration PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/cinehub
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration (access: 15m and refresh: 7d)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# VNPay Configuration
vnpay.tmn-code=GW7JV3Z1
vnpay.hash-secret=${VNP_HASH_SECRET}
vnpay.api-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=http://localhost:8080/api/v1/payments/vnpay-return

# Tăng giới hạn kích thước request để hỗ trợ upload ảnh đại diện base64
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.mvc.message-converters.preferred-json-mapper=jackson
server.tomcat.max-http-form-post-size=10MB
spring.codec.max-in-memory-size=10MB

# Gmail SMTP Configuration
spring.mail.host=smtp.googlemail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Google OAuth Client ID
google.client-id=${GOOGLE_CLIENT_ID}

# Tắt bớt log rác của Spring Boot / Hibernate (Chỉ hiển thị log của app)
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.kientran.cinehub=INFO
